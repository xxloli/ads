name: Download JS Files

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download 51.la JS SDK
        continue-on-error: true
        run: |
          mkdir -p 51
          curl -fsSL -o 51/1.js https://sdk.51.la/js-sdk-pro.min.js || rm -f 51/1.js

      - name: Download 54ads JS
        continue-on-error: true
        run: |
          mkdir -p 54
          curl -fsSL -o 54/1.js https://adservercdn.54ads.com/7db20370.js || rm -f 54/1.js

      - name: Replace domain in 54ads JS
        if: success() || failure()
        run: |
          if [ -f 54/1.js ]; then
            echo "=== Before sed replacement ==="
            head -c 500 54/1.js
            echo ""
            sed -i 's|code\.54ads\.com|adservercdn.54ads.com|g' 54/1.js
            sed -i 's|d\.ff\?(|d.content = d.content.replace(/code\\.54ads\\.com/g, "adservercdn.54ads.com");d.ff?(|g' 54/1.js
            echo "=== After sed replacement ==="
            head -c 500 54/1.js
            echo ""
          else
            echo "54/1.js not found!"
          fi

      - name: Commit and push if changed
        if: success() || failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f 51/1.js ] && git add 51/1.js || true
          [ -f 54/1.js ] && git add 54/1.js || true
          echo "=== Git status ==="
          git status
          echo "=== Git diff --staged ==="
          git diff --staged --stat
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            echo "Changes detected, committing..."
            git commit -m "Auto update JS files [skip ci]"
            git push
          fi
