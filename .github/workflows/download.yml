name: Download JS Files

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download 51.la JS SDK
        run: |
          mkdir -p 51
          curl -fsSL -o 51/1.js https://sdk.51.la/js-sdk-pro.min.js

      - name: Download 54ads JS
        run: |
          mkdir -p 54
          curl -fsSL -o 54/1.js https://cdn.54ads.com/7db20370.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 51/1.js 54/1.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update JS files [skip ci]"
            git push
          fi
